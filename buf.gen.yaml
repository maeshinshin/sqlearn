version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/maeshinshin/sqlearn/backend/gen
plugins:
  - remote: buf.build/connectrpc/gosimple:v1.19.2
    out: backend/gen
    opt:
      - paths=source_relative
      - simple
  # connectrpc/gosimple depends on protocolbuffers/go
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: backend/gen
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/query-es:v2.2.0
    out: frontend/src/gen
    opt:
      - target=ts
  # connectrpc/query-es depends on bufbuild/es
  - remote: buf.build/bufbuild/es:v2.7.0
    out: frontend/src/gen
    opt:
      - target=ts
inputs:
  - directory: proto
